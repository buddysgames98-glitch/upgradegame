# ── Nginx reverse proxy config for Ascension Upgrade Tree ────────────────────
#
# Place this file at:  /etc/nginx/sites-available/ascension
# Then enable it:      sudo ln -s /etc/nginx/sites-available/ascension \
#                                 /etc/nginx/sites-enabled/ascension
# Test config:         sudo nginx -t
# Reload nginx:        sudo systemctl reload nginx
#
# Assumes Docker container is running on localhost:5000
# Replace YOUR_DOMAIN with your actual domain (e.g. game.example.com)

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirect HTTP → HTTPS (remove this block if you don't use SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── SSL certs (use certbot / Let's Encrypt) ──────────────────────────────
    # Run:  sudo certbot --nginx -d YOUR_DOMAIN
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Static files (served directly by nginx for speed) ────────────────────
    location /static/ {
        # Path to your project's static folder on the host
        alias /path/to/upgradegame/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy everything else to Gunicorn ────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_buffering    off;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;
}


# ─────────────────────────────────────────────────────────────────────────────
# QUICK SETUP COMMANDS (run on your Linux Mint server):
#
#   # 1. Install Docker + Compose (if not already)
#   curl -fsSL https://get.docker.com | sh
#   sudo usermod -aG docker $USER   # log out and back in
#
#   # 2. Clone / copy your project to the server
#   scp -r ./upgradegame user@yourserver:/home/user/
#
#   # 3. Start the game container
#   cd /home/user/upgradegame
#   docker compose up -d --build
#
#   # 4. Verify it's running
#   curl http://localhost:5000
#
#   # 5. Install nginx if needed
#   sudo apt install nginx certbot python3-certbot-nginx
#
#   # 6. Copy this config, edit YOUR_DOMAIN and the static alias path
#   sudo cp nginx.conf /etc/nginx/sites-available/ascension
#   sudo nano /etc/nginx/sites-available/ascension   # edit domain + paths
#   sudo ln -s /etc/nginx/sites-available/ascension \
#              /etc/nginx/sites-enabled/ascension
#
#   # 7. Get SSL cert
#   sudo certbot --nginx -d YOUR_DOMAIN
#
#   # 8. Reload
#   sudo systemctl reload nginx
#
# ─────────────────────────────────────────────────────────────────────────────
# CUSTOM ART: drop image files into ./static/art/ named after the node ID.
# Example:  ./static/art/spark.png  →  shows as art for the "spark" node.
# Supported: .png .jpg .jpeg .gif .webp .svg
# Restart the container after adding art (or use a bind mount as in compose).
# ─────────────────────────────────────────────────────────────────────────────
